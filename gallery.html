  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Globetrotter | Photo Gallery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Navigation bar -->
    <nav class="navbar">
      <a href="index.html" class="nav-logo">Globetrotter</a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle" />
      <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="attractions.html">Top Attractions</a></li>
        <li><a href="food.html">Food Guide</a></li>
        <li><a href="gallery.html">Photo Gallery</a></li>
      </ul>
    </nav>

    <!-- Page title -->
    <header class="page-header">
      <h1>Photo Gallery</h1>
    </header>

    <!-- Grid-ready gallery: 5 figure cards -->
    <section class="gallery-grid" aria-label="Chicago photo gallery">
      <figure class="gallery-card">
        <img
          src="https://loremflickr.com/800/600/chicago,cloudgate,bean?lock=14"
          alt="The Cloud Gate sculpture reflecting the Chicago skyline"
        />
        <figcaption>Cloud Gate ("The Bean") shining in Millennium Park.</figcaption>
      </figure>

      <figure class="gallery-card">
        <img
          src="https://loremflickr.com/800/600/chicago,skyline?lock=10"
          alt="The Chicago skyline along Lake Michigan at dusk"
        />
        <figcaption>The skyline glowing over Lake Michigan at sunset.</figcaption>
      </figure>

      <figure class="gallery-card">
        <img
          src="https://loremflickr.com/800/600/chicago,navypier,ferriswheel?lock=16"
          alt="The Centennial Wheel lit up at Navy Pier"
        />
        <figcaption>The Centennial Wheel lighting up Navy Pier at night.</figcaption>
      </figure>

      <figure class="gallery-card">
        <img
          src="https://loremflickr.com/800/600/chicago,river,riverwalk?lock=20"
          alt="The Chicago Riverwalk lined with restaurants and boats"
        />
        <figcaption>Strolling the Chicago Riverwalk on a sunny afternoon.</figcaption>
      </figure>

      <figure class="gallery-card">
        <img
          src="https://loremflickr.com/800/600/chicago,lakemichigan,lakefront?lock=21"
          alt="People biking along the Chicago Lakefront Trail by Lake Michigan"
        />
        <figcaption>Biking the Lakefront Trail with skyline views.</figcaption>
      </figure>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 Globetrotter — A Chicago Travel Guide</p>
      <ul class="footer-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="attractions.html">Top Attractions</a></li>
        <li><a href="food.html">Food Guide</a></li>
        <li><a href="gallery.html">Photo Gallery</a></li>
      </ul>
    </footer>
  </body>
</html>
