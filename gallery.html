    <!-- Page title -->
    <header class="page-header">
      <h1>Photo Gallery</h1>
    </header>

    <!-- Grid-ready gallery: 5 figure cards -->
    <section class="gallery-grid" aria-label="Chicago photo gallery">
      <figure class="gallery-card">
        <img
          src="Earlston Arms.JPG"
          alt="Bars in the city"
        />
        <figcaption>Earleston Arms is a Irish Bar and resturant in the outskirts of Chicago owned by my friend.</figcaption>
      </figure>

      <figure class="gallery-card">
        <img
          src="https://bobbysbikehike.com/chicago/wp-content/uploads/2023/08/Chicago-Beaches.jpg"
          alt="The Chicago skyline along Lake Michigan at dusk"
        />
        <figcaption>Lake Michigan beaches are a great place to relax and enjoy the summer weather.</figcaption>
      </figure>

      <figure class="gallery-card">
        <img
          src="https://arlohotels.com/chicago-downtown-hotel/wp-content/uploads/sites/7/2026/02/St-Patricks-Day-Chicago-Emerald-City-scaled.jpg"
          alt="Saint Patrick Day in Chicago"
        />
        <figcaption>Chicago celebrates St. Patrick's Day with an iconic dyeing of the Chicago River and parade.</figcaption>
      </figure>

      <figure class="gallery-card">
        <img
          src="https://cdn.prod.website-files.com/6580c76ebe70d1634558a7c2/67bf3d2b2f6a89da40b6a519_Chicago-Roastery.jpg"
          alt="The Starbucks Reserve Roastery and Tasting Room"
        />
        <figcaption>A 5 five-story Starbucks coffee shop that gives visitors and inside look into the coffee roasting journey.</figcaption>
      </figure>

      <figure class="gallery-card">
        <img
          src="https://thumbs.dreamstime.com/b/chicago-view-waterfront-bike-trail-along-lake-michigan-shore-usa-august-downtown-skyline-255222357.jpg"
          alt="People biking along the Chicago Lakefront Trail by Lake Michigan"
        />
        <figcaption>Biking the Lakefront Trail with skyline views.</figcaption>
      </figure>
    </section>
